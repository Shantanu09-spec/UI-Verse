<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>UIverse</h2>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="button.html">Buttons</a></li>
      <li><a href="cards.html">Cards</a></li>

      <li><a href="form.html">Forms</a></li>
      <li><a href="color.html">Colors</a></li>
      <li class="active"><a href="navbar.html">Navbars</a></li>
    </ul>
  </aside>

<div class="main">
<div class="page-header">
      <h1>Forms</h1>
      <p>Check out modern and reusable form layouts</p>
    </div>

  <!-- Login Form Card -->
  <div class="component-card login-form-card">
    <div class="login-form-inner-card"> 
      <form class="login-form">
        <h3>LOGIN</h3>
        <label for="Name">Name</label>
        <input type="text" class="input" placeholder="Enter your name" required>
        <label for="Email">Email</label>
        <input type="email" class="input" placeholder="Enter your email" required>
        <button class="gradient-btn">SUBMIT</button>
      </form>
    </div> 
      <div class="actions">
        <button>View Code</button>
        <button>Copy</button>
      </div>
  </div>

  <!-- Sign Up Form Card -->
  <div class="component-card signup-form-card">
    <div class="signup-form-inner-card"> 
      <form class="signup-form">
        <h3>SIGN UP</h3>
        <label for="Name">Name</label>
        <input type="text" class="input" placeholder="Enter your name" required>
        <label for="Email">Email</label>
        <input type="email" class="input" placeholder="Enter your email" required>
        <label for="Password">Password</label>
        <input type="password" class="input" placeholder="Enter your password" required>
        <button class="neon-btn">SIGN UP</button>
      </form>
    </div>
      <div class="actions">
        <button>View Code</button>
        <button>Copy</button>
    </div>
  </div>

  <!-- Contact Us Form Card -->
  <div class="component-card contact-form-card">
    <div class="contact-form-inner-card"> 
        <form class="contact-form">
          <h3>CONTACT US</h3>
          <label for="Name">Name</label>
          <input type="text" class="input" placeholder="Name" required>
          <label for="Email">Email</label>
          <input type="email" class="input" placeholder="Email" required>
          <label for="Message">Message</label>
          <textarea class="input" placeholder="Message" required></textarea>
          <button class="glass-btn">SEND</button>
        </form>
    </div>
        <div class="actions">
           <button>View Code</button>
           <button>Copy</button>
        </div>
   </div>
</div>
</div>

<footer class="footer">
  <div class="footer-container">

    <!-- Brand -->

      <h2>Ulverse</h2>

    <!-- Pages -->

    </div>

</footer>
</body>
</html>
